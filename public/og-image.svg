<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Star particles -->
  <circle cx="120" cy="80" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="340" cy="150" r="1" fill="#60a5fa" opacity="0.4"/>
  <circle cx="900" cy="60" r="2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="1050" cy="200" r="1.5" fill="#93c5fd" opacity="0.3"/>
  <circle cx="200" cy="500" r="1" fill="#3b82f6" opacity="0.4"/>
  <circle cx="1100" cy="480" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="650" cy="100" r="1.5" fill="#93c5fd" opacity="0.3"/>
  <circle cx="780" cy="520" r="1" fill="#3b82f6" opacity="0.6"/>
  <circle cx="420" cy="420" r="1.5" fill="#60a5fa" opacity="0.3"/>
