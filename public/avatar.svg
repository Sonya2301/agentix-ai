<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0a0a0f"/>

  <!-- Star particles -->
  <circle cx="40" cy="50" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="120" cy="30" r="1" fill="#60a5fa" opacity="0.4"/>
  <circle cx="320" cy="45" r="2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="370" cy="120" r="1.5" fill="#93c5fd" opacity="0.3"/>
  <circle cx="60" cy="340" r="1" fill="#3b82f6" opacity="0.4"/>
  <circle cx="360" cy="320" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="200" cy="25" r="1.5" fill="#93c5fd" opacity="0.3"/>
  <circle cx="280" cy="360" r="1" fill="#3b82f6" opacity="0.6"/>
  <circle cx="80" cy="200" r="1" fill="#60a5fa" opacity="0.3"/>
  <circle cx="340" cy="210" r="1.5" fill="#3b82f6" opacity="0.4"/>

  <!-- Glow orb -->
  <radialGradient id="glow" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#glow)"/>

  <!-- Eyebrow -->
  <text x="200" y="165" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle" letter-spacing="4">AI WEB STUDIO</text>

  <!-- Main title -->
  <text x="200" y="240" font-family="Georgia, serif" font-size="56" fill="#e8e8f0" text-anchor="middle" font-style="italic">LYVECA AI</text>
</svg>
